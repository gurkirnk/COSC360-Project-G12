services:
  mongodb:
    image: mongo:7
    container_name: cosc360_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosc360_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      FRONTEND_ORIGIN: http://localhost:5173
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: app_db
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cosc360_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
